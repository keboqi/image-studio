[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
markers = ["smoke: fast compatibility smoke tests", "gpu: optional GPU integration tests"]

[tool.ruff]
target-version = "py311"
line-length = 110
exclude = ["image_studio_webui.py", "image_studio/runtime.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"image_studio/pipelines/**/*.py" = ["F821", "F401", "F811", "F541", "E402", "E701", "E722", "I001", "UP015", "UP038", "B904", "B905"]
"image_studio/generators/*.py" = ["F821", "F401", "F811", "F541", "E402", "E701", "E722", "I001", "UP015", "UP038", "B904", "B905"]
"image_studio/services/*.py" = ["F821", "F401", "F811", "F541", "E402", "E701", "E722", "I001", "UP015", "UP038", "B904", "B905"]
"image_studio/storage/*.py" = ["F821", "F401", "F811", "F541", "E402", "E701", "E722", "I001", "UP015", "UP038", "B904", "B905"]
"image_studio/ui/components/*.py" = ["F821", "F401", "F811", "F541", "E402", "E701", "E722", "I001", "UP015", "UP038", "B904", "B905"]
"image_studio/ui/{wiring,layout,models,gallery_actions}.py" = ["F821", "F401", "F811", "F541", "E402", "E701", "E722", "I001", "UP015", "UP038", "B904", "B905"]
"image_studio/web/{proxy,designer,routes}.py" = ["F821", "F401", "F811", "F541", "E402", "E701", "E722", "I001", "UP015", "UP038", "B904", "B905"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = true
exclude = "image_studio_webui.py"
